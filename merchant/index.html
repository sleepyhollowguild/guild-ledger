<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Guild Ledger - Merchant</title><link rel="stylesheet" href="../assets/css/app.css"></head>
<body><div class="appShell" id="top"><section class="hero"><div class="brandBar"><div class="sig">SH</div><div class="titleBlock"><h1>Merchant Dashboard</h1><div class="sub">Order Queue</div></div><div class="navLinks"><a href="../customer/">Customer Ledger</a></div></div><div class="statusRow"><span class="seal" id="livePill">Connecting to Firebase…</span><span class="seal gold" id="salesPill">0 completed today</span><button id="exportBtn" class="secondary">Export Sold Cards CSV</button><button onclick="openInventoryUpdater()" class="ghost">📦 Update Inventory</button><button onclick="resetMarketDay()" class="ghost">Reset Market Day</button><button id="clearCompletedBtn" class="ghost">Hide Completed</button></div></section>
<div class="dashboardTools"><div class="merchantTabs"><button data-filter="active" class="active">Active Orders</button><button data-filter="waiting">Waiting</button><button data-filter="pulling">Pulling</button><button data-filter="ready">Ready</button><button data-filter="completed">Completed</button><button data-filter="all">All</button></div></div><div id="orders" class="ordersGrid"></div><div class="empty hidden" id="empty">No orders in the queue.</div></div>
<div class="modal hidden" id="modal"><div class="modalCard" id="modalCard"></div></div><button class="topBtn" id="topBtn" title="Back to top">🏮</button><div class="toast" id="toast"></div><script type="module" src="../assets/js/merchant.js"></script></body></html>
